{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RAG Portal{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'rag_core/app.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{% url 'home' %}">Azure RAG</a>
      <nav>
        <a href="{% url 'chat' %}">Ask</a>
        <a href="{% url 'upload' %}">Upload</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer wrap">
    <small>Django + Azure OpenAI + Azure AI Search</small>
  </footer>
</body>
</html>
