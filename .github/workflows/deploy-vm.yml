name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target environment"
        required: true
        default: "staging"
        type: choice
        options: ["staging", "production"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    needs: []
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_APP_DIR: ${{ secrets.VM_APP_DIR }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          missing=0
          [ -z "$VM_HOST" ] && echo "::error::Missing GitHub Secret: VM_HOST" && missing=1
          [ -z "$VM_USER" ] && echo "::error::Missing GitHub Secret: VM_USER" && missing=1
          [ -z "$VM_APP_DIR" ] && echo "::error::Missing GitHub Secret: VM_APP_DIR" && missing=1
          [ -z "$VM_SSH_PRIVATE_KEY" ] && echo "::error::Missing GitHub Secret: VM_SSH_PRIVATE_KEY" && missing=1
          [ -z "$ENV_FILE" ] && echo "::error::Missing GitHub Secret: ENV_FILE" && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "Add secrets in GitHub: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VM host key (pinned)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Upload app to VM
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".venv/" \
            --exclude "__pycache__/" \
            --exclude "*.sqlite3" \
            --exclude ".env" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ secrets.VM_APP_DIR }}/"

      - name: Configure .env on VM
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "bash -lc 'mkdir -p \"${{ secrets.VM_APP_DIR }}\" && cat > \"${{ secrets.VM_APP_DIR }}/.env\" <<\"EOF\"\n${{ secrets.ENV_FILE }}\nEOF\nchmod 600 \"${{ secrets.VM_APP_DIR }}/.env\"'"

      - name: Deploy (install, migrate, collectstatic, restart)
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "bash -lc 'cd \"${{ secrets.VM_APP_DIR }}\" && bash deploy/deploy_vm.sh'"

      - name: Smoke test health endpoint
        run: |
          curl -fsS "${{ secrets.APP_HEALTHCHECK_URL }}"

